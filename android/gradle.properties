org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true

# Kotlin's incremental compiler can't compute a relative path between the
# pub cache and a project on a different drive letter on Windows, which
# crashes when it tries to persist its cache (harmless — the build still
# succeeds via a full recompile — but noisy). Disabled to silence it.
kotlin.incremental=false
