name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install libsqlite3 (required by drift's NativeDatabase in tests)
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-0

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.7'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Verify generated code is up to date
        run: |
          dart run build_runner build --force-jit
          git diff --exit-code -- lib/data/local/app_database.g.dart

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test
